name: Release

# Publishes to npm with provenance whenever a vX.Y.Z tag is pushed.
# Authentication uses npm's Trusted Publisher (OIDC) — this repo is registered
# on the npm package side, so no NPM_TOKEN is needed. The `id-token: write`
# permission below is what lets GitHub issue the OIDC token npm verifies.
#
# Actions are pinned to commit SHAs (not tags) so a hijacked tag in an
# upstream action repo can't silently inject malicious steps into our pipeline.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write    # required to auto-create GitHub Releases
      id-token: write    # required for npm provenance and OIDC trusted publishing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        # Intentionally NO registry-url: when it's set, setup-node writes an
        # .npmrc with _authToken=<placeholder> that npm CLI tries to use
        # before falling back to OIDC, which makes Trusted Publisher publish
        # fail with 404. Without registry-url, npm 11+ uses OIDC cleanly.
        with:
          node-version: 20
          cache: npm

      # npm OIDC trusted publishing requires npm >= 11.5.1, which is newer
      # than what ships with Node 20 by default. Upgrade explicitly.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish with provenance
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
