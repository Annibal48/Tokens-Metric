name: Release

# Publishes to npm with provenance whenever a vX.Y.Z tag is pushed.
# Requires the NPM_TOKEN secret to be set in the repository:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name: NPM_TOKEN
#   Value: a granular access token with "Read and write" on tokens-metric and
#   "bypass 2FA" enabled (npm requires this for automated publishing).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
